name: Bug Report
description: Something isn't working as documented
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please check [docs/troubleshooting.md](../../docs/troubleshooting.md)
        first — your symptom may already have a documented cause and fix.

  - type: input
    id: version
    attributes:
      label: gh-helix version
      description: Output of `gh-helix --version`, or the commit SHA if running from source.
      placeholder: '2.0.0'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: 'v22.11.0'
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact gh-helix command (redact org names/tokens if needed).
      render: shell
      placeholder: 'gh-helix backup --include "api-*"'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exact error message and exit code if applicable. See [exit codes](../../docs/cli-reference.md#exit-codes).
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Output from `--log-file`, or console output. Redact tokens/org/repo names if sensitive.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I ran `gh-helix health` and it passed (or I've included its output above)
        - label: I checked [docs/troubleshooting.md](../../docs/troubleshooting.md) for this symptom
        - label: This is not a security vulnerability (see [SECURITY.md](../../SECURITY.md) if it is)
