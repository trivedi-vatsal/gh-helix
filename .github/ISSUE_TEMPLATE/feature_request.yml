name: Feature Request
description: Propose a new capability or behavior change
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Please check [docs/roadmap.md](../../docs/roadmap.md) first — your idea may already be a
        known gap or planned extension point. Describe the **use case**, not just the desired API;
        see [CONTRIBUTING.md](../../CONTRIBUTING.md#before-you-start) for how this gets evaluated.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution — what are you unable to do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the ideal fix look like? A new flag, a new command, a config option?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you considered.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - CLI / commands
        - Configuration
        - Backup workflow
        - Restore workflow
        - Repository discovery
        - Metadata / locking / transactions
        - Git LFS
        - GitHub Enterprise Server
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked [docs/roadmap.md](../../docs/roadmap.md) and this isn't already listed
        - label: This doesn't require gh-helix to gain write access to GitHub (see [docs/security.md](../../docs/security.md#threat-model))
